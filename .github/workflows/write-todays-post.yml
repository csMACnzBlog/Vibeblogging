name: Write Today's Post

on:
  schedule:
    - cron: "5 0 * * *"  # 00:05 UTC daily
  workflow_dispatch:

permissions:
  issues: write
  actions: write

jobs:
  write-todays-post:
    runs-on: ubuntu-latest
    steps:
      - name: Find post-request issue or create one
        id: find-or-create-issue
        uses: actions/github-script@v7
        with:
          script: |
            // Skip if a daily-post PR is already open
            const openPRs = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open "[daily-post]" in:title`
            });
            if (openPRs.data.total_count > 0) {
              console.log('A [daily-post] PR is already open — skipping.');
              return;
            }

            // Search for open, unassigned issues that look like post requests
            const { data: { items: issues } } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open no:assignee`
            });

            const postKeywords = ['write', 'post', 'blog', 'article', 'topic'];
            const relevantIssue = issues.find(issue => {
              const text = (issue.title + ' ' + (issue.body || '')).toLowerCase();
              return postKeywords.some(kw => text.includes(kw));
            });

            if (relevantIssue) {
              console.log(`Found issue #${relevantIssue.number}: "${relevantIssue.title}"`);
              core.setOutput('issue-number', relevantIssue.number);
              core.setOutput('issue-title', relevantIssue.title);
              core.setOutput('issue-body', relevantIssue.body || '');
            } else {
              const today = new Date().toISOString().split('T')[0];
              console.log('No suitable issue found — creating one.');
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[daily-post] Write today's post - ${today}`,
                body: "write today's post"
              });
              console.log(`Created issue #${newIssue.number}`);
              core.setOutput('issue-number', newIssue.number);
            }

      - name: Start agent session
        if: steps.find-or-create-issue.outputs.issue-number
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.find-or-create-issue.outputs.issue-number }}
          ISSUE_TITLE: ${{ steps.find-or-create-issue.outputs.issue-title }}
          ISSUE_BODY: ${{ steps.find-or-create-issue.outputs.issue-body }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;
            const issueBody = process.env.ISSUE_BODY;

            let prompt = 'write todays post';
            if (issueTitle) {
              const bodySnippet = issueBody ? `\n\n${issueBody}` : '';
              prompt = `write todays post implementing the issue\n\n**Issue #${issueNumber}: ${issueTitle}**${bodySnippet}`.trim();
            }

            console.log(`Starting agent session for issue #${issueNumber}`);
            console.log(`Prompt: ${prompt}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily-post.lock.yml',
              ref: 'main',
              inputs: {}
            });
            console.log('Agent session workflow dispatched successfully.');
