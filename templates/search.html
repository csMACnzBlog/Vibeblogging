<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Vibeblogging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            font-size: 16px;
            background: #ffffff;
            color: #4b4b4b;
            padding: 16px;
        }

        .search-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
        }

        #search-input {
            width: 100%;
            padding: 10px 14px;
            font-size: 16px;
            font-family: Georgia, serif;
            border: 2px solid #00bbf2;
            border-radius: 6px;
        }

        #search-input:focus {
            outline: none;
            border-color: #0080a6;
        }

        .tag-filters-label {
            font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
            font-size: 0.9em;
            color: #4b4b4b;
        }

        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-btn {
            padding: 3px 12px;
            font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
            font-size: 14px;
            border: 2px solid #a36a00;
            border-radius: 20px;
            background: #ffffff;
            color: #a36a00;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .tag-btn.active {
            background: #a36a00;
            color: #ffffff;
        }

        .tag-btn:hover {
            background: #0080a6;
            border-color: #0080a6;
            color: #ffffff;
        }

        .tag-btn:focus {
            outline: 2px solid #0080a6;
            outline-offset: 2px;
        }

        .results-count {
            font-size: 0.85em;
            color: #666666;
            margin-bottom: 12px;
            min-height: 1.2em;
        }

        .post-item {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
            align-items: flex-start;
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-thumbnail {
            flex-shrink: 0;
            width: 80px;
            height: 60px;
            border-radius: 6px;
            object-fit: cover;
        }

        .post-item-content {
            flex: 1;
            min-width: 0;
        }

        .post-item h2 {
            font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
            font-weight: normal;
            font-size: 1.15em;
            color: #4b4b4b;
            margin-bottom: 4px;
        }

        .post-item h2 a {
            color: #4b4b4b;
            text-decoration: none;
        }

        .post-item h2 a:hover {
            color: #0080a6;
        }

        .post-meta {
            font-size: 0.8em;
            color: #0080a6;
            margin-bottom: 4px;
        }

        .post-excerpt {
            font-size: 0.88em;
            color: #666666;
            overflow-wrap: break-word;
        }

        .no-results {
            color: #666666;
            font-style: italic;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="search-header">
        <input type="search" id="search-input" placeholder="Search posts…" aria-label="Search posts" autofocus>
        <div>
            <p class="tag-filters-label" id="tag-filters-label">Filter by tag:</p>
            <div id="tag-filters" class="tag-filters" role="group" aria-labelledby="tag-filters-label"></div>
        </div>
    </div>
    <p id="results-count" class="results-count" aria-live="polite" aria-atomic="true"></p>
    <div id="results"></div>
    <script>
    (function () {
        'use strict';

        var posts = {{POSTS_JSON}};

        var activeTags = [];

        var allTags = [];
        posts.forEach(function (p) {
            p.tags.forEach(function (t) {
                if (allTags.indexOf(t) === -1) {
                    allTags.push(t);
                }
            });
        });
        allTags.sort();

        var tagFilters = document.getElementById('tag-filters');
        allTags.forEach(function (tag) {
            var btn = document.createElement('button');
            btn.setAttribute('type', 'button');
            btn.className = 'tag-btn';
            btn.setAttribute('aria-pressed', 'false');
            btn.textContent = tag;
            btn.addEventListener('click', function () {
                var idx = activeTags.indexOf(tag);
                if (idx === -1) {
                    activeTags.push(tag);
                    btn.classList.add('active');
                    btn.setAttribute('aria-pressed', 'true');
                } else {
                    activeTags.splice(idx, 1);
                    btn.classList.remove('active');
                    btn.setAttribute('aria-pressed', 'false');
                }
                render();
            });
            tagFilters.appendChild(btn);
        });

        function filterPosts() {
            var text = document.getElementById('search-input').value.toLowerCase().trim();
            return posts.filter(function (p) {
                var matchText = !text ||
                    p.title.toLowerCase().indexOf(text) !== -1 ||
                    p.excerpt.toLowerCase().indexOf(text) !== -1;
                var matchTags = activeTags.every(function (tag) {
                    return p.tags.indexOf(tag) !== -1;
                });
                return matchText && matchTags;
            });
        }

        function escapeHtml(str) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        function render() {
            var filtered = filterPosts();
            var resultsEl = document.getElementById('results');
            var countEl = document.getElementById('results-count');

            countEl.textContent = filtered.length + ' result' + (filtered.length !== 1 ? 's' : '');

            if (filtered.length === 0) {
                resultsEl.innerHTML = '<p class="no-results">No posts match your search.</p>';
                return;
            }

            var html = '';
            filtered.forEach(function (p) {
                html += '<div class="post-item">';
                if (p.image) {
                    html += '<img src="images/posts/' + escapeHtml(p.image) + '" alt="" class="post-thumbnail">';
                }
                html += '<div class="post-item-content">';
                html += '<h2><a href="' + escapeHtml(p.slug) + '.html" target="_top">' + escapeHtml(p.title) + '</a></h2>';
                html += '<div class="post-meta">';
                html += '<time datetime="' + escapeHtml(p.date) + '">' + escapeHtml(p.formattedDate) + '</time>';
                if (p.tags.length > 0) {
                    html += ' &mdash; ' + p.tags.map(escapeHtml).join(', ');
                }
                html += '</div>';
                html += '<div class="post-excerpt">' + escapeHtml(p.excerpt) + '</div>';
                html += '</div>';
                html += '</div>';
            });
            resultsEl.innerHTML = html;
        }

        document.getElementById('search-input').addEventListener('input', render);

        render();
    })();
    </script>
</body>
</html>
